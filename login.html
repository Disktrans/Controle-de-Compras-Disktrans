      <h1>Controle de Compras — T.I.</h1>

      <p id="mensagem-status" class="alerta alerta--erro" role="alert" hidden></p>

      <form id="form-login" class="formulario" novalidate data-form="login">
        <div class="formulario__campo">
          <label for="login-email">E-mail</label>
          <input
            type="email"
            id="login-email"
            name="email"
            autocomplete="username"
            required>
        </div>

        <div class="formulario__campo">
          <label for="login-senha">Senha</label>
          <input
            type="password"
            id="login-senha"
            name="senha"
            autocomplete="current-password"
            required>
        </div>

        <div class="formulario__acoes">
          <button type="submit" class="botao">Entrar</button>
        </div>

        <p class="formulario__rodape">
          <button type="button" class="botao--link" data-acao="mostrar-recuperar">Esqueci minha senha</button>
        </p>
        <p class="formulario__rodape">
          <a href="criar-conta.html">Ainda não tem conta? Cadastre-se</a>
        </p>
      </form>

      <form id="form-recuperar" class="formulario" novalidate hidden data-form="recuperar-senha">
        <p class="u-texto-secundario">Informe seu e-mail cadastrado. Enviaremos um link para redefinir sua senha.</p>

        <div class="formulario__campo">
          <label for="recuperar-email">E-mail</label>
          <input
            type="email"
            id="recuperar-email"
            name="email"
            autocomplete="username"
            required>
        </div>

        <div class="formulario__acoes">
          <button type="submit" class="botao">Enviar link de recuperação</button>
        </div>

        <p class="formulario__rodape">
          <button type="button" class="botao--link" data-acao="voltar-login">Voltar para o login</button>
        </p>
      </form>

      <p class="formulario__rodape u-mt-4">
        <a href="privacidade.html">Aviso de privacidade</a>
      </p>
