<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir senha — Controle de Compras Disktrans</title>
  <link rel="stylesheet" href="css/styles.css">
  <script
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.4/dist/umd/supabase.js"
    integrity="sha384-rqOdr5xucl4VNvjCtZO01Sdq0MqFsLBP2XT5dbe9hwm5032CwN/S+iTtUwzJe7OB"
    crossorigin="anonymous"
    defer></script>
</head>
<body class="pagina">
  <main class="login">
    <div class="login__cartao">
      <h1>Definir nova senha</h1>

      <p id="mensagem-status" class="alerta alerta--erro" role="alert" hidden></p>

      <form id="form-redefinir" class="formulario" novalidate data-form="redefinir-senha">
        <div class="formulario__campo">
          <label for="nova-senha">Nova senha</label>
          <input
            type="password"
            id="nova-senha"
            name="novaSenha"
            autocomplete="new-password"
            minlength="8"
            required>
        </div>

        <div class="formulario__campo">
          <label for="confirmar-senha">Confirmar nova senha</label>
          <input
            type="password"
            id="confirmar-senha"
            name="confirmarSenha"
            autocomplete="new-password"
            minlength="8"
            required>
        </div>

        <div class="formulario__acoes">
          <button type="submit" class="botao">Salvar nova senha</button>
        </div>

        <p class="formulario__rodape">
          <a href="login.html">Voltar para o login</a>
        </p>
      </form>

      <p class="formulario__rodape u-mt-4">
        <a href="privacidade.html">Aviso de privacidade</a>
      </p>
    </div>
  </main>

  <script type="module" src="js/redefinir-senha.js"></script>
</body>
</html>
